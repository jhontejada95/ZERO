<!doctype html>
<html lang="en">
<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ZERO product design QA</title>
  <style>

<body>
  <main>
    <figure><figcaption>Visual target</figcaption><img src="/docs/product-dashboard-reference.png" alt="Selected ZERO dashboard design" /></figure>
